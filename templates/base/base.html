<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reping</title>
    <link rel="icon" type="image/x-icon" href="{% static 'Images/favicon_io/favicon.ico' %}" />
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'Images/favicon_io/favicon-32x32.png' %}" />
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'Images/favicon_io/favicon-16x16.png' %}" />
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'Images/favicon_io/apple-touch-icon.png' %}" />
    <link rel="manifest" href="{% static 'Images/favicon_io/site.webmanifest' %}" />
    <link rel="stylesheet" href="{% static 'css/app_nav.css' %}" />
    <link rel="stylesheet" href="{% static 'css/pages.css' %}" />
    <style>
      :root {
        --bg: #0F0F12;
        --surface: #1A1A1F;
        --surface-2: #222229;
        --border: #2C2C34;
        --text: #FFFFFF;
        --muted: #A1A1AA;
        --muted-2: #A1A1AA;
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
        --accent: #3B82F6;
        --accent-2: #22C55E;
        --danger: #F87171;
        --radius: 16px;
        --radius-sm: 12px;
        --max: 1040px;
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }

      body {
        margin: 0;
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: #070A12;
      }

      a { color: inherit; text-decoration: none; }

      .app-shell {
        min-height: 100%;
        padding: 28px 16px 40px;
        position: relative;
      }

      .container {
        width: 100%;
        max-width: var(--max);
        margin: 0 auto;
      }

      .card {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius);
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        transition: transform 250ms ease, box-shadow 250ms ease, border-color 250ms ease;
      }

      .card:hover {
        transform: translateY(-4px);
        border-color: rgba(59, 130, 246, 0.60);
        box-shadow:
          0 18px 58px rgba(0, 0, 0, 0.70),
          0 0 0 1px rgba(59, 130, 246, 0.20),
          0 0 34px rgba(59, 130, 246, 0.18);
      }

      .card-inner {
        padding: 18px;
      }

      .muted { color: var(--muted); }
      .muted-2 { color: var(--muted-2); }

      .grid {
        display: grid;
        gap: 14px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        border: 0;
        cursor: pointer;
        font-weight: 650;
        letter-spacing: 0.2px;
        border-radius: 999px;
        padding: 12px 16px;
        transition: transform 120ms ease, filter 120ms ease;
      }

      .btn:active { transform: translateY(1px); }

      .btn-primary {
        color: white;
        background: linear-gradient(135deg, var(--accent) 0%, #2563EB 55%, #1D4ED8 100%);
        box-shadow:
          0 18px 44px rgba(0, 0, 0, 0.45),
          0 10px 28px rgba(59, 130, 246, 0.22);
      }

      .btn-primary:hover { filter: brightness(1.05); }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--muted);
        font-size: 12px;
      }

      .kpi {
        display: grid;
        gap: 6px;
      }

      .kpi .label {
        font-size: 13px;
        color: var(--muted);
      }

      .kpi .value {
        font-size: 32px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .section-title {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: var(--muted);
        text-transform: uppercase;
      }

      .divider {
        height: 1px;
        width: 100%;
        background: rgba(255, 255, 255, 0.08);
      }

      @media (min-width: 780px) {
        .app-shell { padding: 38px 18px 56px; }
        .card-inner { padding: 22px; }
      }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  {% include "base/_app_nav.html" %}
  <div class="app-shell" data-page="{% block page_id %}{% endblock %}">
    <div class="ambient-lights" aria-hidden="true"></div>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
