{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reping — Log in</title>
  <link rel="icon" type="image/x-icon" href="{% static 'Images/favicon_io/favicon.ico' %}" />
  <link rel="stylesheet" href="{% static 'css/auth.css' %}" />
</head>
<body class="auth-page">

  <div class="auth-bg" aria-hidden="true"></div>

  <main class="auth-center">
    <div class="auth-card">

      <a class="auth-logo" href="/" aria-label="Reping home">
        <img class="auth-logo-icon" src="{% static 'Images/Reping.png' %}" alt="" aria-hidden="true" />
        <span class="auth-logo-text">Reping</span>
      </a>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Log in to continue building momentum.</p>

      <form class="auth-form" method="post" action="">
        {% csrf_token %}

        <div class="auth-field">
          <label class="auth-label" for="id_username">Username</label>
          <input
            class="auth-input"
            type="text"
            id="id_username"
            name="username"
            autocomplete="username"
            autocapitalize="none"
            spellcheck="false"
            required
          />
        </div>

        <div class="auth-field">
          <label class="auth-label" for="id_password">Password</label>
          <input
            class="auth-input"
            type="password"
            id="id_password"
            name="password"
            autocomplete="current-password"
            required
          />
        </div>

        {% if form.errors %}
        <p class="auth-error">Username or password is incorrect. Please try again.</p>
        {% endif %}

        <button class="auth-btn-primary" id="loginBtn" type="submit" disabled>Log in</button>
      </form>

      <div class="auth-divider"><span>or</span></div>

      <div class="auth-social">

        <form method="post" action="{% url 'apple_login' %}">
          {% csrf_token %}
          <button class="auth-social-btn" type="submit" aria-label="Continue with Apple">
            <svg class="auth-social-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.39-1.32 2.76-2.53 3.99zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
            </svg>
            Continue with Apple
          </button>
        </form>

        <form method="post" action="{% url 'google_login' %}">
          {% csrf_token %}
          <button class="auth-social-btn" type="submit" aria-label="Continue with Google">
            <svg class="auth-social-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
          </button>
        </form>

        <form method="post" action="{% url 'facebook_login' %}">
          {% csrf_token %}
          <button class="auth-social-btn" type="submit" aria-label="Continue with Facebook">
            <svg class="auth-social-icon" viewBox="0 0 24 24" fill="#1877F2" aria-hidden="true">
              <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.271h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
            </svg>
            Continue with Facebook
          </button>
        </form>

      </div>

      <p class="auth-signup">
        Don't have an account?
        <a class="auth-signup-link" href="{% url 'account_signup' %}">Create account</a>
      </p>

    </div>
  </main>

  <script>
    (function () {
      var u = document.getElementById('id_username');
      var p = document.getElementById('id_password');
      var btn = document.getElementById('loginBtn');
      function check() {
        btn.disabled = !(u.value.trim() && p.value.trim());
      }
      u.addEventListener('input', check);
      p.addEventListener('input', check);
    })();
  </script>

</body>
</html>
